<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitoring · DK SL8 SAI Mampang</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sage:    #a8c5a0;
    --sage-lt: #d4e8d0;
    --sage-bg: #f0f7ee;
    --sage-dk: #6a9e63;
    --stone:   #8c8c86;
    --stone-lt:#e8e8e4;
    --stone-bg:#f7f7f5;
    --ink:     #2d2d2a;
    --ink-lt:  #5a5a55;
    --white:   #fefefe;
    --radius:  14px;
    --shadow:  0 2px 16px rgba(100,130,90,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sage-bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
  }
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--stone-lt);
    padding: 28px 24px 20px;
    text-align: center;
  }
  .chip {
    display: inline-block;
    background: var(--sage-lt);
    color: var(--sage-dk);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink);
  }
  .header p { color: var(--stone); font-size: 13px; margin-top: 6px; }

  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px; }

  /* ── Stat cards ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--stone-lt);
    border-radius: var(--radius);
    padding: 16px 10px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--sage-dk);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--stone);
    margin-top: 5px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* ── Progress ring ── */
  .ring-card {
    background: var(--white);
    border: 1px solid var(--stone-lt);
    border-radius: var(--radius);
    padding: 28px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .ring-wrap { position: relative; display: inline-block; margin-bottom: 16px; }
  .ring-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--ink);
  }
  .ring-sub {
    font-size: 11px;
    color: var(--stone);
    display: block;
    margin-top: 2px;
  }
  .progress-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--stone);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── Linear bar ── */
  .bar-track {
    width: 100%;
    height: 10px;
    background: var(--stone-lt);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--sage-dk));
    border-radius: 99px;
    transition: width 0.8s ease;
    width: 0%;
  }
  .bar-sub {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--stone);
  }

  /* ── List cards ── */
  .card {
    background: var(--white);
    border: 1px solid var(--stone-lt);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 14px;
  }
  .name-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .name-tag {
    font-size: 12.5px;
    padding: 5px 12px;
    border-radius: 99px;
    font-weight: 500;
  }
  .tag-done {
    background: var(--sage-lt);
    color: var(--sage-dk);
  }
  .tag-pending {
    background: var(--stone-bg);
    color: var(--stone);
  }

  /* ── Phase badge ── */
  .phase-chip {
    display: inline-block;
    background: #fef9ee;
    border: 1px solid #f5d88a;
    color: #92701a;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 16px;
  }

  /* ── Winner banner ── */
  .winner-banner {
    background: linear-gradient(135deg, #e8f5e0, #d4e8d0);
    border: 1px solid var(--sage);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .winner-banner p:first-child { font-size: 12px; color: var(--sage-dk); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .winner-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); margin-top: 6px; }

  /* ── Refresh ── */
  .refresh-bar {
    text-align: center;
    font-size: 12px;
    color: var(--stone);
    margin-bottom: 16px;
  }
  .refresh-bar button {
    background: none;
    border: 1px solid var(--stone-lt);
    border-radius: 99px;
    padding: 5px 16px;
    font-size: 12px;
    color: var(--sage-dk);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .loading { text-align: center; padding: 60px 0; color: var(--stone); font-size: 14px; }
  .dot { animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  .footer-nav { text-align: center; margin-top: 20px; font-size: 13px; color: var(--stone); }
  .footer-nav a { color: var(--sage-dk); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="chip">Monitoring</div>
  <h1>Partisipasi OTS</h1>
  <p>SL8 SAI Mampang · Data diperbarui otomatis</p>
</div>

<div class="wrap">
  <div id="loading" class="loading">
    Memuat data<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <div id="content" style="display:none">

    <div id="winner-area" style="display:none">
      <div class="winner-banner">
        <p>DK Terpilih</p>
        <div class="winner-name" id="winner-name"></div>
      </div>
    </div>

    <div id="phase-area" style="text-align:center;margin-bottom:8px"></div>

    <div class="refresh-bar">
      <button onclick="loadData()">↻ Refresh</button>
      &nbsp; Auto-refresh tiap 30 detik
    </div>

    <!-- Stat chips -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-voted">0</div>
        <div class="stat-label">Sudah Vote</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-pending">0</div>
        <div class="stat-label">Belum Vote</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">32</div>
        <div class="stat-label">Total OTS</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="ring-card">
      <p class="progress-title">Tingkat Partisipasi</p>
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#e8e8e4" stroke-width="12"/>
        <circle id="ring-arc" cx="70" cy="70" r="58" fill="none"
          stroke="#6a9e63" stroke-width="12"
          stroke-linecap="round"
          stroke-dasharray="364.4"
          stroke-dashoffset="364.4"
          transform="rotate(-90 70 70)"
          style="transition: stroke-dashoffset 1s ease"/>
      </svg>
      <div class="ring-wrap" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none">
      </div>
      <div style="margin-top:-100px;margin-bottom:16px">
        <div style="font-family:'DM Serif Display',serif;font-size:36px;color:var(--ink)" id="pct-big">0%</div>
        <div style="font-size:12px;color:var(--stone);margin-top:2px" id="pct-sub">dari 32 keluarga</div>
      </div>

      <div style="margin-top:8px">
        <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
        <div class="bar-sub">
          <span id="voted-label">0 sudah</span>
          <span id="pending-label">32 belum</span>
        </div>
      </div>
    </div>

    <!-- Sudah vote -->
    <div class="card">
      <p class="card-title">✅ Sudah Mengisi (<span id="voted-count">0</span>)</p>
      <div class="name-grid" id="voted-list"></div>
    </div>

    <!-- Belum vote -->
    <div class="card">
      <p class="card-title">⏳ Belum Mengisi (<span id="pending-count">0</span>)</p>
      <div class="name-grid" id="pending-list"></div>
    </div>

  </div>

  <div class="footer-nav">
    <a href="index.html">← Kembali ke form voting</a>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDbgsLITb7nnCc1X2Xt0_dxqxW7vM4b8nDhZXI3UHikTc1HRWQ3cZcTuOTXX-MGnlq/exec";

async function loadData() {
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getMonitor&t=${Date.now()}`);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    // Phase
    const phaseArea = document.getElementById("phase-area");
    phaseArea.innerHTML = `<span class="phase-chip">${data.phase === "r2" ? "⚡ Putaran 2" : data.phase === "done" ? "✔ Selesai" : "Putaran 1"}</span>`;

    // Winner
    if (data.winner) {
      document.getElementById("winner-area").style.display = "block";
      document.getElementById("winner-name").textContent = data.winner;
    }

    // Stats
    document.getElementById("stat-voted").textContent   = data.votedCount;
    document.getElementById("stat-pending").textContent = data.notYetCount;
    document.getElementById("stat-total").textContent   = data.totalOTS;
    document.getElementById("pct-big").textContent      = data.pct + "%";
    document.getElementById("pct-sub").textContent      = `dari ${data.totalOTS} keluarga`;
    document.getElementById("voted-label").textContent  = `${data.votedCount} sudah`;
    document.getElementById("pending-label").textContent= `${data.notYetCount} belum`;
    document.getElementById("voted-count").textContent  = data.votedCount;
    document.getElementById("pending-count").textContent= data.notYetCount;

    // Progress ring (circumference = 2π×58 ≈ 364.4)
    const circ  = 364.4;
    const offset = circ - (data.pct / 100 * circ);
    document.getElementById("ring-arc").style.strokeDashoffset = offset;

    // Bar
    document.getElementById("bar-fill").style.width = data.pct + "%";

    // Voted list
    const vl = document.getElementById("voted-list");
    vl.innerHTML = "";
    (data.votedList || []).sort().forEach(n => {
      const t = document.createElement("span");
      t.className = "name-tag tag-done";
      t.textContent = n;
      vl.appendChild(t);
    });
    if (!data.votedList?.length) vl.innerHTML = '<span style="color:var(--stone);font-size:13px">Belum ada.</span>';

    // Pending list
    const pl = document.getElementById("pending-list");
    pl.innerHTML = "";
    (data.notYetList || []).sort().forEach(n => {
      const t = document.createElement("span");
      t.className = "name-tag tag-pending";
      t.textContent = n;
      pl.appendChild(t);
    });
    if (!data.notYetList?.length) pl.innerHTML = '<span style="color:var(--sage-dk);font-size:13px">Semua OTS sudah vote! 🎉</span>';

  } catch(e) {
    document.getElementById("loading").innerHTML = "<p style='color:#b91c1c;text-align:center'>Gagal memuat. Coba refresh.</p>";
  }
}

loadData();
setInterval(loadData, 30000); // auto-refresh 30 detik
</script>
</body>
</html>
